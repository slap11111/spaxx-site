<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HXZE • NEON VOID • Ω²</title>
    <style>
        :root {
            --bg-purple: #1a0033;
            --accent-orange: #ff8c00;
            --text-purple: #e0b0ff;
            --terminal-black: #0d001a;
        }
        body {
            background: var(--bg-purple);
            background: radial-gradient(circle, #2e0054 0%, #0d001a 100%);
            color: var(--text-purple);
            font-family: 'Consolas', monospace;
            margin: 0; padding: 20px;
        }
        h1 {
            color: var(--accent-orange);
            text-align: center;
            font-size: 4rem;
            text-shadow: 0 0 20px rgba(255, 140, 0, 0.6);
            margin-bottom: 50px;
        }
        .report {
            background: var(--terminal-black);
            border: 2px solid var(--accent-orange);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(128, 0, 128, 0.5);
            max-width: 1000px; margin: auto;
        }
        #c2-console {
            display: none;
            margin-top: 20px;
            border-color: #f0f; /* Hot pink/purple border for console */
        }
        .log-view {
            height: 200px; overflow-y: auto;
            border: 1px solid #444; background: #000;
            padding: 10px; font-size: 0.9rem; margin-bottom: 10px;
        }
        .input-box {
            width: 80%; background: #000; border: 1px solid var(--accent-orange);
            color: var(--accent-orange); padding: 10px;
        }
        button {
            background: var(--accent-orange); color: #000;
            border: none; padding: 10px 20px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>HXZE // VOID-C2</h1>
        <div class="report">
            <div id="system-info">
                [ STATUS: ENCRYPTED UPLINK ]<br>
                [ OS: WINDOWS 11 / PYTHON 3.14 STABLE ]<br>
                [ BEACON: ACTIVE ]
            </div>
            
            <div id="c2-console">
                <hr style="border: 0.5px solid #444;">
                <div class="log-view" id="log"></div>
                <input type="text" id="cmd" class="input-box" placeholder="Awaiting Command...">
                <button onclick="transmit()">SEND</button>
            </div>
        </div>
        <p style="text-align:center; margin-top:20px;">
            <button onclick="document.getElementById('c2-console').style.display='block'">ACCESS OVERRIDE</button>
        </p>
    </div>

    <script>
        async function transmit() {
            const cmd = document.getElementById('cmd').value;
            const log = document.getElementById('log');
            log.innerHTML += `<div style="color:var(--accent-orange)">[OUT] ${cmd}</div>`;
            // Add your fetch logic here as discussed previously
            document.getElementById('cmd').value = '';
        }
    </script>
</body>
</html>
